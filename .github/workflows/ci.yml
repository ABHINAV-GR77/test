name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend Tests ────────────────────────────────────
  backend-test:
    runs-on: [self-hosted, windows]
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Clean locked files
        run: |
          $ws = "${{ github.workspace }}"
          foreach ($dir in '.pytest_cache', '__pycache__', 'selenium\.pytest_cache', 'selenium\__pycache__') {
            $p = Join-Path $ws $dir
            if (Test-Path $p) { attrib -r -h -s "$p\*" /s /d 2>$null; Remove-Item $p -Recurse -Force -ErrorAction SilentlyContinue }
          }
        working-directory: .
        continue-on-error: true

      - uses: actions/checkout@v4

      - name: Mark workspace as safe directory
        run: git config --global --add safe.directory "${{ github.workspace }}"

      - name: Verify Python
        run: python --version

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run unit tests
        run: python -m pytest tests/ -v --tb=short

  # ── Frontend Tests ───────────────────────────────────
  frontend-test:
    runs-on: [self-hosted, windows]
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Clean locked files
        run: |
          $ws = "${{ github.workspace }}"
          foreach ($dir in '.pytest_cache', '__pycache__', 'selenium\.pytest_cache', 'selenium\__pycache__') {
            $p = Join-Path $ws $dir
            if (Test-Path $p) { attrib -r -h -s "$p\*" /s /d 2>$null; Remove-Item $p -Recurse -Force -ErrorAction SilentlyContinue }
          }
        working-directory: .
        continue-on-error: true

      - uses: actions/checkout@v4

      - name: Mark workspace as safe directory
        run: git config --global --add safe.directory "${{ github.workspace }}"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify Node
        run: node --version

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run unit tests
        run: npm test

  # ── Docker Build ─────────────────────────────────────
  docker-build:
    runs-on: [self-hosted, windows]
    needs: [backend-test, frontend-test]
    steps:
      - name: Clean locked files
        run: |
          $ws = "${{ github.workspace }}"
          foreach ($dir in '.pytest_cache', '__pycache__', 'selenium\.pytest_cache', 'selenium\__pycache__') {
            $p = Join-Path $ws $dir
            if (Test-Path $p) { attrib -r -h -s "$p\*" /s /d 2>$null; Remove-Item $p -Recurse -Force -ErrorAction SilentlyContinue }
          }
        continue-on-error: true

      - uses: actions/checkout@v4

      - name: Mark workspace as safe directory
        run: git config --global --add safe.directory "${{ github.workspace }}"

      - name: Build backend image
        run: |
          docker build -t student-app-backend:${{ github.sha }} ./backend

      - name: Build frontend image
        run: |
          docker build -t student-app-frontend:${{ github.sha }} ./frontend

      - name: Verify images
        run: docker images | Select-String "student-app"

      - name: Clean up old images
        run: docker image prune -f

  # ── Deploy ───────────────────────────────────────────
  deploy:
    runs-on: [self-hosted, windows]
    needs: [docker-build]
    steps:
      - name: Clean locked files
        run: |
          $ws = "${{ github.workspace }}"
          foreach ($dir in '.pytest_cache', '__pycache__', 'selenium\.pytest_cache', 'selenium\__pycache__') {
            $p = Join-Path $ws $dir
            if (Test-Path $p) { attrib -r -h -s "$p\*" /s /d 2>$null; Remove-Item $p -Recurse -Force -ErrorAction SilentlyContinue }
          }
        continue-on-error: true

      - uses: actions/checkout@v4

      - name: Mark workspace as safe directory
        run: git config --global --add safe.directory "${{ github.workspace }}"

      - name: Stop existing containers
        run: docker compose down
        continue-on-error: true

      - name: Start services with fresh build
        run: docker compose up --build -d

      - name: Wait for services to be healthy
        run: |
          Start-Sleep -Seconds 30
          docker compose ps

      - name: Verify application health
        run: |
          $response = Invoke-WebRequest -Uri http://localhost:8000/api/health -UseBasicParsing
          if ($response.StatusCode -eq 200) { Write-Host "Backend is healthy" } else { exit 1 }
